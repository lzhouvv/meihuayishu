<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>梅花易数 · 2026世界杯预测</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #d4a843;
    --accent-light: #f0d080;
    --accent-dim: #a07830;
    --accent-glow: rgba(212,168,67,.15);
    --bg-dark: #0d0906;
    --bg-card: #1a120c;
    --bg-panel: #231a10;
    --surface: #1a120c;
    --surface2: #221810;
    --surface3: #2a1e12;
    --text: #e8ddd0;
    --text-dim: #9a8a78;
    --text-muted: #6a5d4e;
    --border: #3a2d1e;
    --border-light: #4a3a28;
    --success: #4ecdc4;
    --danger: #ff6b6b;
    --draw: #ffd93d;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 40px rgba(0,0,0,.55);
  }
  html { scroll-behavior: smooth; font-size: 20px; }
  body {
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(212,168,67,.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(212,168,67,.03) 0%, transparent 60%);
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  .header {
    text-align: center; padding: 32px 20px 18px; user-select: none;
    background: linear-gradient(180deg, rgba(13,9,6,.98), var(--bg-dark));
    border-bottom: 1px solid rgba(212,168,67,.08);
  }
  .header h1 {
    font-size: 1.8rem; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent-light), var(--accent), var(--accent-dim));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .header .subtitle { font-size: .82rem; color: var(--text-dim); margin-top: 4px; letter-spacing: 2px; }
  .header .subtitle span { color: var(--accent); }
  .header .badge { display: inline-block; margin-top: 8px; padding: 3px 14px; border: 1px solid rgba(212,168,67,.2); border-radius: 20px; font-size: .68rem; color: var(--accent-dim); letter-spacing: 1px; }

  .container { max-width: 1120px; margin: 0 auto; padding: 0 20px 50px; }

  .top-bar {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 22px; margin: 18px 0;
  }
  .top-bar .tb-item { display: flex; align-items: center; gap: 6px; font-size: .9rem; color: var(--text-dim); }
  .top-bar .tb-item .tb-val { color: var(--accent-light); font-weight: 600; font-size: .95rem; }
  .top-bar .tb-item .tb-icon { font-size: 1.1rem; }
  .top-bar .tb-item input, .top-bar .tb-item select {
    background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 12px; color: var(--accent-light); font-family: inherit; font-size: .88rem; outline: none; font-weight: 500;
  }
  .top-bar .tb-item input:focus { border-color: var(--accent-dim); }
  .date-picker { color-scheme: dark; cursor: pointer; min-width: 140px; }
  .date-picker::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(.6); }
  .top-bar .btn-sm { padding: 5px 14px; font-size: .78rem; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 24px; margin-bottom: 16px;
    transition: border-color .3s, box-shadow .3s;
  }
  .card:hover { border-color: rgba(212,168,67,.12); box-shadow: 0 4px 20px rgba(0,0,0,.2); }
  .card-title { font-size: 1rem; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; letter-spacing: .5px; font-weight: 600; }
  .card-title .icon { font-size: 1.1rem; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 20px; border: none; border-radius: 6px;
    font-family: inherit; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: all .25s; letter-spacing: .5px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent-dim), var(--accent)); color: #fff; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,168,67,.25); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-sm { padding: 5px 12px; font-size: .75rem; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-ghost:hover { border-color: var(--accent-dim); color: var(--accent-light); }

  .match-list { display: flex; flex-direction: column; gap: 8px; }
  .match-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; overflow: hidden;
    transition: all .25s ease; box-shadow: 0 2px 10px rgba(0,0,0,.2);
  }
  .match-card:hover { border-color: rgba(212,168,67,.2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.3); }
  .match-card.selected { border-color: var(--accent-dim); box-shadow: 0 0 0 1px rgba(212,168,67,.15), 0 4px 16px rgba(0,0,0,.3); background: linear-gradient(135deg, var(--surface), rgba(212,168,67,.04)); }
  .match-card.finished { opacity: .6; }
  .match-col-header { display: flex; align-items: center; padding: 5px 10px; margin-bottom: 2px; gap: 4px; font-size: .7rem; color: var(--text-muted); letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  .match-col-header .mch-time { flex:1; text-align:center; }
  .match-col-header .mch-group { flex:1; text-align:center; }
  .match-col-header .mch-home { flex:1.5; text-align:center; }
  .match-col-header .mch-vs { min-width:20px; text-align:center; }
  .match-col-header .mch-away { flex:1.5; text-align:center; }
  .match-col-header .mch-score { flex:1; text-align:center; }
  .match-body { padding: 8px 10px; display: flex; align-items: center; gap: 4px; }
  .match-body .mb-time { flex:1; font-size: .78rem; color: var(--text-dim); text-align:center; font-weight: 600; line-height: 1.3; }
  .match-body .mb-time .sub { font-size:.62rem; color:var(--text-muted); display:block; }
  .match-body .mb-group { flex:1; font-size: .8rem; color: var(--accent-light); text-align:center; font-weight: 700; }
  .match-body .mb-home { flex:1.5; display: flex; align-items: center; justify-content: center; }
  .match-body .mb-home .ti { display:inline-flex; align-items:center; gap:8px; min-width:110px; }
  .match-body .mb-home .flag { font-size: 1.2rem; line-height: 1; }
  .match-body .mb-home .name { font-weight: 700; font-size: .85rem; letter-spacing: .3px; white-space: nowrap; }
  .match-body .mb-vs { font-size: .7rem; color: var(--text-muted); text-align:center; min-width:20px; }
  .match-body .mb-away { flex:1.5; display: flex; align-items: center; justify-content: center; }
  .match-body .mb-away .ti { display:inline-flex; align-items:center; gap:8px; min-width:110px; }
  .match-body .mb-away .flag { font-size: 1.2rem; line-height: 1; }
  .match-body .mb-away .name { font-weight: 700; font-size: .85rem; letter-spacing: .3px; white-space: nowrap; }
  .match-body .mb-score { flex:1; font-size: .9rem; font-weight: 800; color: var(--accent-light); text-align:center; }
  .match-card.finished .match-body .mb-home .name,
  .match-card.finished .match-body .mb-away .name { color: var(--text-dim); }
  .match-card.finished .match-body .mb-score { color: var(--text-dim); }
  .match-list-wrap { max-height: 600px; overflow-y: auto; padding-right: 4px; }
  .match-list-wrap::-webkit-scrollbar { width: 4px; }
  .match-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .selected-area { display: none; margin-top: 36px; }
  .sel-card { background: var(--surface); border: 1px solid var(--accent-dim); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .sel-card .sel-teams { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .sel-card .sel-teams .sel-vs { color: var(--text-dim); font-weight: 400; font-size: .8rem; }
  .sel-card .sel-info { font-size: .75rem; color: var(--text-dim); }
  .sel-card .sel-actions { display: flex; gap: 8px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .empty-state .big { font-size: 2.2rem; margin-bottom: 8px; }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); max-width:520px; width:92%; max-height:80vh; overflow-y:auto; padding:22px 26px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .modal::-webkit-scrollbar { width:4px; }
  .modal::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .modal-close { float:right; background:none; border:none; color:var(--text-dim); font-size:1.4rem; cursor:pointer; padding:0 4px; line-height:1; transition:color .2s; }
  .modal-close:hover { color:var(--accent-light); }


  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .progress-area { animation: fadeUp .3s ease; }
  .progress-bar-track { height:4px; background:var(--bg-dark); border-radius:2px; margin:12px auto; max-width:320px; overflow:hidden; }
  .progress-bar-fill { height:100%; width:0%; border-radius:2px; background:linear-gradient(90deg,var(--accent-dim),var(--accent),var(--accent-light)); transition:width .4s ease; }
  .progress-stage { font-size:.88rem; color:var(--accent-light); font-weight:600; letter-spacing:.5px; }
  .progress-time { font-size:.68rem; color:var(--text-dim); margin-top:3px; }

  .hexagram-display { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: center; }
  .hexagram-col { text-align: center; }
  .hexagram-col .name { font-size: 1.15rem; font-weight: 700; color: var(--accent-light); margin-bottom: 3px; }
  .hexagram-col .name-sub { font-size: .72rem; color: var(--text-dim); margin-bottom: 8px; }
  .hexagram-col .desc { font-size: .75rem; color: var(--text-dim); line-height: 1.6; margin-top: 8px; max-width: 200px; margin-left: auto; margin-right: auto; }
  .hexagram-arrow { text-align: center; color: var(--accent-dim); font-size: 1.4rem; }
  .hexagram-arrow .label { font-size: .65rem; display: block; margin-top: 3px; color: var(--text-dim); }

  .yao-list { display: flex; flex-direction: column; gap: 3px; align-items: center; }
  .yao-line { width: 100px; height: 14px; display: flex; align-items: center; justify-content: center; position: relative; }
  .yao-line .solid { display: block; width: 100%; height: 5px; background: var(--accent); border-radius: 2px; }
  .yao-line .broken { display: flex; width: 100%; gap: 20%; height: 5px; }
  .yao-line .broken span { flex: 1; height: 5px; background: var(--accent); border-radius: 2px; }
  .yao-line.moving .solid { background: var(--danger); box-shadow: 0 0 6px rgba(255,107,107,.4); }
  .yao-line.moving .broken span { background: var(--danger); box-shadow: 0 0 6px rgba(255,107,107,.4); }
  .yao-line .yao-index { position: absolute; left: -22px; font-size: .5rem; color: var(--text-dim); opacity: .4; }

  .calc-bar { text-align: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: .72rem; color: var(--text-dim); }

  .tiyong-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .tiyong-card { text-align: center; padding: 10px; background: var(--bg-dark); border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .tiyong-card .ty-label { font-size: .68rem; color: var(--text-dim); letter-spacing: .5px; margin-bottom: 3px; }
  .tiyong-card .ty-trigram { font-size: 1.8rem; margin: 2px 0; }
  .tiyong-card .ty-name { font-size: .82rem; color: var(--accent-light); font-weight: 600; }
  .tiyong-card .ty-wuxing { font-size: .7rem; color: var(--text-dim); margin-top: 2px; }
  .tiyong-relation { grid-column: 1 / -1; text-align: center; padding: 8px; border-radius: var(--radius-sm); font-size: .85rem; letter-spacing: .5px; background: rgba(212,168,67,.06); border: 1px solid rgba(212,168,67,.12); }
  .tiyong-relation .highlight { color: var(--accent-light); font-weight: 600; }

  .prediction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pred-item { background: var(--bg-dark); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); transition: all .3s; }
  .pred-item:hover { border-color: rgba(212,168,67,.1); }
  .pred-item .p-label { font-size: .7rem; color: var(--text-dim); letter-spacing: .5px; margin-bottom: 3px; }
  .pred-item .p-value { font-size: 1.15rem; font-weight: 700; color: var(--accent-light); }
  .pred-item .p-detail { font-size: .75rem; color: var(--text-dim); margin-top: 3px; line-height: 1.5; }
  .pred-item .p-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: .62rem; font-weight: 600; margin-top: 3px; letter-spacing: .5px; }
  .p-badge.win { background: rgba(78,205,196,.15); color: var(--success); border: 1px solid rgba(78,205,196,.2); }
  .p-badge.lose { background: rgba(255,107,107,.15); color: var(--danger); border: 1px solid rgba(255,107,107,.2); }
  .p-badge.draw { background: rgba(255,217,61,.12); color: var(--draw); border: 1px solid rgba(255,217,61,.18); }

  .detail-text { font-size: .82rem; line-height: 1.8; color: var(--text-dim); white-space: pre-line; }

  .footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: .68rem; opacity: .5; letter-spacing: 1px; }

  /* 历史记录 */
  .history-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .history-btn { font-size: .72rem; color: var(--text-muted); cursor: pointer; background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; transition: all .2s; font-family: inherit; }
  .history-btn:hover { border-color: var(--accent-dim); color: var(--accent-light); }
  .history-btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .history-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .2s; border-radius: 4px; }
  .history-item:hover { background: rgba(212,168,67,.04); }
  .history-item:last-child { border-bottom: none; }
  .history-item .hi-time { font-size: .78rem; color: var(--text-dim); flex:1; text-align:center; font-weight: 500; line-height: 1.3; }
  .history-item .hi-home { flex:1.5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .history-item .hi-home:hover { color: var(--accent-light); }
  .history-item .hi-home .ti { display:inline-flex; align-items:center; gap:8px; min-width:100px; }
  .history-item .hi-home .hi-flag { font-size: 1.2rem; line-height: 1; }
  .history-item .hi-home .hi-name { white-space: nowrap; letter-spacing: .4px; font-weight: 700; font-size: .85rem; }
  .history-item .hi-vs { font-size: .7rem; font-weight: 400; color: var(--text-muted); min-width:20px; text-align:center; }
  .history-item .hi-away { flex:1.5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .history-item .hi-away:hover { color: var(--accent-light); }
  .history-item .hi-away .ti { display:inline-flex; align-items:center; gap:8px; min-width:100px; }
  .history-item .hi-away .hi-flag { font-size: 1.2rem; line-height: 1; }
  .history-item .hi-away .hi-name { white-space: nowrap; letter-spacing: .4px; font-weight: 700; font-size: .85rem; }
  .history-item .hi-result { flex:1; font-size: .85rem; font-weight: 700; text-align:center; }
  .history-item .hi-result.win { color: var(--success); }
  .history-item .hi-result.lose { color: var(--danger); }
  .history-item .hi-result.draw { color: var(--draw); }
  .history-item .hi-del { font-size:.65rem; color:var(--text-muted); cursor:pointer; padding:2px 6px; opacity:.3; transition:all .2s; }
  .history-item .hi-del:hover { opacity:1; color:var(--danger); }
  .history-item.finished { opacity:.4; }
  .history-empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: .95rem; }
  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 12px 0 4px; font-size: .78rem; color: var(--text-dim); }
  .pagination .page-btn { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; color: var(--text-dim); cursor: pointer; font-size: .72rem; font-family: inherit; transition: all .2s; }
  .pagination .page-btn:hover { border-color: var(--accent-dim); color: var(--accent-light); }
  .pagination .page-btn:disabled { opacity: .3; cursor: default; }
  .pagination .page-info { font-size: .72rem; color: var(--text-muted); }

  @media (max-width: 768px) {
    html { font-size: 15px; }
    .container { padding: 0 8px; }
    .header { padding: 20px 12px 14px; }
    .header h1 { font-size: 1.1rem; letter-spacing: 2px; }
    .header .subtitle { font-size: .7rem; }
    .header .badge { font-size: .6rem; padding: 2px 10px; }
    .card { padding: 10px 8px; margin-bottom: 10px; }
    .card-title { font-size: .85rem; margin-bottom: 8px; }
    .top-bar { flex-direction: row; flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
    .top-bar .tb-item { font-size: .75rem; }
    .top-bar .tb-item .tb-val { font-size: .8rem; }
    .top-bar .tb-item:last-child { margin-left: 0 !important; width: 100%; }
    .top-bar .tb-item:last-child .btn { width: 100%; justify-content: center; }
    .match-body { padding: 4px 6px; gap: 2px; }
    .match-body .mb-time { font-size: .65rem; min-width: 0; }
    .match-body .mb-time .sub { font-size: .5rem; }
    .match-body .mb-group { font-size: .65rem; }
    .match-body .mb-home .flag, .match-body .mb-away .flag { font-size: 1rem; }
    .match-body .mb-home .name, .match-body .mb-away .name { font-size: .7rem; }
    .match-body .mb-home .ti, .match-body .mb-away .ti { min-width: 60px; gap: 4px; }
    .match-body .mb-vs { font-size: .6rem; min-width: 14px; }
    .match-body .mb-score { font-size: .72rem; min-width: 28px; }
    .match-card { border-radius: 6px; }
    .match-list-wrap { max-height: 400px; }
    .match-col-header { font-size: .6rem; padding: 3px 6px; }
    .sel-card { flex-direction: column; text-align: center; padding: 10px; }
    .sel-card .sel-teams { font-size: .9rem; }
    .sel-card .sel-actions { width: 100%; justify-content: center; }
    .sel-card .sel-actions .btn { flex: 1; }
    .hexagram-display { grid-template-columns: 1fr; gap: 6px; }
    .hexagram-arrow { transform: rotate(90deg); font-size: 1rem; }
    .hexagram-arrow .label { font-size: .55rem; }
    .hexagram-col .name { font-size: .9rem; }
    .hexagram-col .name-sub { font-size: .6rem; }
    .hexagram-col .desc { font-size: .65rem; }
    .yao-line { width: 60px; height: 12px; }
    .yao-line .solid, .yao-line .broken { height: 4px; }
    .calc-bar { font-size: .6rem; }
    .prediction-grid { grid-template-columns: 1fr; gap: 6px; }
    .pred-item { padding: 8px; }
    .pred-item .p-label { font-size: .6rem; }
    .pred-item .p-value { font-size: .9rem; }
    .pred-item .p-detail { font-size: .65rem; }
    .tiyong-grid { grid-template-columns: 1fr; gap: 6px; }
    .tiyong-card { padding: 6px; }
    .tiyong-card .ty-label { font-size: .6rem; }
    .tiyong-card .ty-trigram { font-size: 1.4rem; }
    .tiyong-card .ty-name { font-size: .7rem; }
    .tiyong-relation { font-size: .7rem; padding: 6px; }
    .detail-text { font-size: .7rem; }
    .history-item { padding: 8px 6px; gap: 4px; }
    .history-item .hi-time { font-size: .6rem; min-width: 0; flex: 0 0 auto; }
    .history-item .hi-home .ti, .history-item .hi-away .ti { min-width: 50px; gap: 3px; }
    .history-item .hi-home .hi-flag, .history-item .hi-away .hi-flag { font-size: .9rem; }
    .history-item .hi-home .hi-name, .history-item .hi-away .hi-name { font-size: .7rem; }
    .history-item .hi-vs { font-size: .6rem; min-width: 14px; }
    .history-item .hi-result { font-size: .7rem; }
    .history-item .hi-del { font-size: .55rem; padding: 2px 4px; }
    .modal { padding: 14px 12px; max-width: 96%; }
    .pagination { flex-wrap: wrap; gap: 4px; }
    .pagination .page-btn { font-size: .6rem; padding: 3px 6px; }

function hashStr(s,seed){ var h=0; for(var i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; } return Math.abs(h+(seed||0)); }

function getYao(up,lo){ var b={1:7,2:6,3:5,4:4,5:3,6:2,7:1,8:0},u=b[up],l=b[lo],r=[]; for(var i=0;i<3;i++)r.push((l>>(2-i))&1); for(var i=0;i<3;i++)r.push((u>>(2-i))&1); return r; }

function l2h(ls){ var r={7:1,6:2,5:3,4:4,3:5,2:6,1:7,0:8}; return{ upperId:r[(ls[3]<<2)|(ls[4]<<1)|ls[5]]||8, lowerId:r[(ls[0]<<2)|(ls[1]<<1)|ls[2]]||8 }; }

function anaTY(b,u){ var bw=b.wuxing,uw=u.wuxing; if(bw===uw)return{type:'harmony',desc:'体用比和 · 势均力敌',symbol:'⚖️'}; if(WX.k[bw]===uw)return{type:'bodyKe',desc:'体克用 · 主队克客队（'+bw+'克'+uw+'）',symbol:'🛡️'}; if(WX.k[uw]===bw)return{type:'useKe',desc:'用克体 · 客队克主队（'+uw+'克'+bw+'）',symbol:'⚠️'}; if(WX.s[bw]===uw)return{type:'bodySheng',desc:'体生用 · 主队生客队（'+bw+'生'+uw+'）',symbol:'💫'}; if(WX.s[uw]===bw)return{type:'useSheng',desc:'用生体 · 客队生主队（'+uw+'生'+bw+'）',symbol:'✨'}; return{type:'neutral',desc:'体用无直接生克',symbol:'➖'}; }

  var hi=((mv+body.id+use.id)%3), pht=opts[hi%opts.length];
  var pool={'胜':{'火':[[2,1],[3,1],[3,2],[2,0]],'水':[[2,1],[3,2],[1,0],[2,0]],'木':[[3,1],[4,2],[2,0],[3,0]],'金':[[2,0],[1,0],[3,1],[2,1]],'土':[[1,0],[2,0],[2,1],[1,0]]},'负':{'火':[[1,2],[1,3],[2,3],[0,2]],'水':[[0,1],[1,2],[0,2],[1,3]],'木':[[1,2],[0,3],[1,3],[0,2]],'金':[[0,1],[1,2],[0,2]],'土':[[0,1],[1,2],[0,2]]},'平局':{'火':[[2,2],[3,3],[1,1]],'水':[[1,1],[2,2],[0,0]],'木':[[2,2],[3,3],[1,1]],'金':[[1,1],[0,0],[2,2]],'土':[[0,0],[1,1],[1,1]]},'主不败':{'火':[[2,1],[3,2],[1,0],[1,1]],'水':[[1,0],[2,1],[1,1]],'木':[[2,0],[3,1],[1,0],[1,1]],'金':[[1,0],[2,0],[1,1]],'土':[[1,0],[0,0],[1,1],[2,0]]}};

var HISTORY_PAGE = 1;
var HISTORY_PAGE_SIZE = 10;

function saveHistory(result,match){
  var history=JSON.parse(localStorage.getItem('mhys_history')||'[]');
  var record={
    id: Date.now(),
    time: new Date().toLocaleString('zh-CN'),
    home: match.h, away: match.a,
    wdl: result.predictions.wdl,
    wdlBadge: result.predictions.wdlBadge,
    score: result.predictions.score,
    hexagramName: result.hexagram.primary.n,
    changedName: result.hexagram.changed.n,
    resultData: result
  };
  history.unshift(record);
  if(history.length>200) history=history.slice(0,200);
  localStorage.setItem('mhys_history',JSON.stringify(history));
  renderHistory(); // 新增后自动刷新
}
function getHistory(){ return JSON.parse(localStorage.getItem('mhys_history')||'[]'); }

function renderHistory(){
  var body=document.getElementById('history-body');
  body.style.display='block';
  var list=getHistory();
  if(list.length===0){ body.innerHTML='<div class="history-empty">暂无起卦记录</div>'; return; }
  var totalPages=Math.ceil(list.length/HISTORY_PAGE_SIZE);
  if(HISTORY_PAGE>totalPages) HISTORY_PAGE=totalPages;
  var start=(HISTORY_PAGE-1)*HISTORY_PAGE_SIZE;
  var end=Math.min(start+HISTORY_PAGE_SIZE, list.length);
  var h='';
  for(var i=start;i<end;i++){ var r=list[i];
    var fh=(TEAMS[r.home]&&TEAMS[r.home].flag)||''; var fa=(TEAMS[r.away]&&TEAMS[r.away].flag)||'';
    var isFinished=false; var saved=getSavedScores(); var key=r.home+'|'+r.away;
    if(saved[key]||saved[r.away+'|'+r.home]) isFinished=true;
    h+='<div class="history-item'+(isFinished?' finished':'')+'"><span class="hi-time">'+r.time+'</span><span class="hi-home" onclick="showHistoryDetail('+i+')"><span class="ti"><span class="hi-flag">'+fh+'</span><span class="hi-name">'+r.home+'</span></span></span><span class="hi-vs">vs</span><span class="hi-away" onclick="showHistoryDetail('+i+')"><span class="ti"><span class="hi-flag">'+fa+'</span><span class="hi-name">'+r.away+'</span></span></span><span class="hi-result '+r.wdlBadge+'">'+fmtWdl(r.wdl)+'</span><span class="hi-del" onclick="deleteHistory('+i+')" title="删除此记录">✕</span></div>';
  }
  // 翻页
  if(totalPages>1){
    h+='<div class="pagination">';
    h+='<button class="page-btn" onclick="changePage(-1)"'+(HISTORY_PAGE<=1?' disabled':'')+'>◀ 上一页</button>';
    h+='<span class="page-info">第 '+HISTORY_PAGE+'/'+totalPages+' 页（共 '+list.length+' 条）</span>';
    h+='<button class="page-btn" onclick="changePage(1)"'+(HISTORY_PAGE>=totalPages?' disabled':'')+'>下一页 ▶</button>';

function importHistory(event){
  var file=event.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=e.target.result;
      var lines=text.split('\n').filter(function(l){ return l.trim().length>0; });
      if(lines.length<2){ alert('文件格式无效'); return; }
      var imported=[];
      for(var i=1;i<lines.length;i++){
        // 按逗号分割，处理引号转义
        var parts=parseCSVLine(lines[i]);
        if(parts.length<7) continue;
        var record={
          id: Date.now()+i,
          time: parts[0],
          home: parts[1],
          away: parts[2],
          wdl: parts[3],
          wdlBadge: parts[3]==='胜'?'win':parts[3]==='负'?'lose':parts[3]==='平局'?'draw':'win',
          score: parts[4],
          hexagramName: parts[5],
          changedName: parts[6],
          resultData: null
        };
        imported.push(record);
      }
      if(imported.length===0){ alert('未解析到有效记录'); return; }
      var exist=getHistory();
      var all=imported.concat(exist);
      localStorage.setItem('mhys_history',JSON.stringify(all));
      renderHistory();
      alert('成功导入 '+imported.length+' 条记录');
    } catch(err){
      alert('导入失败：'+err.message);
    }
  };
  reader.readAsText(file,'UTF-8');
  event.target.value='';
}

function parseCSVLine(line){
  var result=[], current='', inQuotes=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQuotes){
      if(c==='"'){
        if(i+1<line.length && line[i+1]==='"'){ current+='"'; i++; }
        else inQuotes=false;
      } else { current+=c; }
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ result.push(current); current=''; }
      else current+=c;
    }
  }
  result.push(current);
  return result;
}

function applyScoresToMatch(match, dateStr, idx){
  var saved=getSavedScores();
  var key=match.h+'|'+match.a;
  var sc=saved[key];
  if(sc && sc.h!==undefined && sc.a!==undefined){
    match.r = { h:sc.h, a:sc.a };
    return true;
  }
  var revKey=match.a+'|'+match.h;
  var sc2=saved[revKey];
  if(sc2 && sc2.h!==undefined && sc2.a!==undefined){
    match.r = { h:sc2.a, a:sc2.h };
    return true;
  }
  return false;
}

// 获取实际开球时间
function getRealMatchTime(dateStr, match, index, total){
  var timeSlots = {
    4: ['01:00','04:00','07:00','10:00'],
    5: ['23:00','02:00','05:00','08:00','11:00'],
    6: ['22:00','01:00','04:00','07:00','10:00','13:00']
  };
  var slots = timeSlots[total] || timeSlots[4];
  if(index < slots.length) return slots[index];
  return (10 + index * 3).toString().padStart(2,'0') + ':00';
}
